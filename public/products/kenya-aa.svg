<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <linearGradient id="bg-ken" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#0F0500"/>
      <stop offset="100%" stop-color="#1A0A00"/>
    </linearGradient>
    <linearGradient id="bag-ken" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8B2E0A"/>
      <stop offset="35%" stop-color="#5C1E06"/>
      <stop offset="100%" stop-color="#1A0A00"/>
    </linearGradient>
    <linearGradient id="label-ken" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5ECD7"/>
      <stop offset="100%" stop-color="#EDE4CC"/>
    </linearGradient>
    <radialGradient id="light-ken" cx="20%" cy="70%" r="60%">
      <stop offset="0%" stop-color="#C44B1B" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <rect width="800" height="1000" fill="url(#bg-ken)"/>
  <rect width="800" height="1000" fill="url(#light-ken)"/>

  <circle cx="700" cy="200" r="1.5" fill="#C44B1B" opacity="0.3"/>
  <circle cx="80" cy="600" r="1" fill="#E8A045" opacity="0.2"/>
  <circle cx="650" cy="800" r="2" fill="#C44B1B" opacity="0.2"/>

  <!-- Bag -->
  <rect x="220" y="180" width="360" height="560" rx="12" fill="url(#bag-ken)"/>
  <line x1="276" y1="180" x2="276" y2="740" stroke="#0F0500" stroke-width="1.5" opacity="0.35"/>
  <line x1="524" y1="180" x2="524" y2="740" stroke="#0F0500" stroke-width="1.5" opacity="0.35"/>

  <path d="M220 180 Q280 164 400 162 Q520 164 580 180" stroke="#1A0A00" stroke-width="2" fill="none" opacity="0.4"/>
  <rect x="240" y="155" width="320" height="30" rx="4" fill="#0F0500" opacity="0.8"/>

  <!-- Valve -->
  <circle cx="400" cy="220" r="20" fill="#0F0500" opacity="0.45"/>
  <circle cx="400" cy="220" r="14" fill="none" stroke="#C44B1B" stroke-width="1.5" opacity="0.7"/>
  <circle cx="400" cy="220" r="6" fill="#C44B1B" opacity="0.4"/>

  <!-- Label -->
  <rect x="255" y="275" width="290" height="330" rx="6" fill="url(#label-ken)"/>
  <rect x="255" y="275" width="290" height="8" rx="3" fill="#3D2B1F"/>

  <text x="400" y="320" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7A6A5A" letter-spacing="3" font-style="italic">SINGLE ORIGIN</text>

  <text x="400" y="360" text-anchor="middle" font-family="Georgia, serif" font-size="28" font-weight="700" fill="#1A0A00">Kenya AA</text>

  <line x1="295" y1="378" x2="505" y2="378" stroke="#3D2B1F" stroke-width="1" opacity="0.4"/>

  <text x="400" y="408" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#3D2B1F" letter-spacing="1">MEDIUM-LIGHT ROAST</text>
  <text x="400" y="445" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7A6A5A" letter-spacing="1">Blackcurrant · Pomelo · Honey</text>
  <text x="400" y="482" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7A6A5A">NYERI COUNTY, KENYA</text>

  <!-- AA grade badge -->
  <rect x="330" y="496" width="140" height="28" rx="14" fill="#1A0A00"/>
  <text x="400" y="514" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#C44B1B" letter-spacing="2">AA GRADE · 1700m</text>

  <text x="400" y="570" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7A6A5A" letter-spacing="2">250g · ROASTED TO ORDER</text>

  <!-- Direct trade stamp -->
  <circle cx="400" cy="620" r="30" fill="none" stroke="#C44B1B" stroke-width="1" stroke-dasharray="3,3" opacity="0.4"/>
  <text x="400" y="616" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#7A6A5A" letter-spacing="1">DIRECT</text>
  <text x="400" y="630" text-anchor="middle" font-family="Georgia, serif" font-size="9" fill="#7A6A5A" letter-spacing="1">TRADE</text>

  <!-- Abstract wave (Kenya highlands) -->
  <path d="M260 770 Q310 750 360 765 Q410 780 460 758 Q510 740 540 760" stroke="#C44B1B" stroke-width="1.5" fill="none" opacity="0.3" stroke-linecap="round"/>

  <ellipse cx="400" cy="950" rx="180" ry="60" fill="#C44B1B" opacity="0.07"/>
  <text x="400" y="970" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7A6A5A" letter-spacing="3" opacity="0.7">EMBER &amp; ASH</text>
</svg>