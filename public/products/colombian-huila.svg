<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <linearGradient id="bg-col" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1A0A00"/>
      <stop offset="100%" stop-color="#0F0500"/>
    </linearGradient>
    <linearGradient id="bag-col" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7A6A5A"/>
      <stop offset="40%" stop-color="#4A3828"/>
      <stop offset="100%" stop-color="#1A0A00"/>
    </linearGradient>
    <linearGradient id="label-col" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5ECD7"/>
      <stop offset="100%" stop-color="#EDE4CC"/>
    </linearGradient>
    <radialGradient id="light-col" cx="70%" cy="25%" r="55%">
      <stop offset="0%" stop-color="#E8A045" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <rect width="800" height="1000" fill="url(#bg-col)"/>
  <rect width="800" height="1000" fill="url(#light-col)"/>

  <circle cx="680" cy="90" r="2" fill="#E8A045" opacity="0.3"/>
  <circle cx="100" cy="300" r="1.5" fill="#C44B1B" opacity="0.25"/>
  <circle cx="740" cy="500" r="1" fill="#E8A045" opacity="0.2"/>

  <!-- Bag -->
  <rect x="220" y="180" width="360" height="560" rx="12" fill="url(#bag-col)"/>
  <line x1="278" y1="180" x2="278" y2="740" stroke="#0F0500" stroke-width="1.5" opacity="0.4"/>
  <line x1="522" y1="180" x2="522" y2="740" stroke="#0F0500" stroke-width="1.5" opacity="0.4"/>

  <path d="M220 180 Q280 162 400 160 Q520 162 580 180" stroke="#1A0A00" stroke-width="2" fill="none" opacity="0.5"/>
  <rect x="240" y="155" width="320" height="30" rx="4" fill="#0F0500" opacity="0.7"/>

  <!-- Valve -->
  <circle cx="400" cy="220" r="20" fill="#0F0500" opacity="0.5"/>
  <circle cx="400" cy="220" r="14" fill="none" stroke="#E8A045" stroke-width="1.5" opacity="0.5"/>
  <circle cx="400" cy="220" r="6" fill="#E8A045" opacity="0.35"/>

  <!-- Label -->
  <rect x="255" y="275" width="290" height="330" rx="6" fill="url(#label-col)"/>
  <rect x="255" y="275" width="290" height="8" rx="3" fill="#E8A045"/>

  <text x="400" y="320" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7A6A5A" letter-spacing="3" font-style="italic">SINGLE ORIGIN</text>

  <text x="400" y="358" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#1A0A00">Colombian</text>
  <text x="400" y="388" text-anchor="middle" font-family="Georgia, serif" font-size="22" font-weight="700" fill="#1A0A00">Huila</text>

  <line x1="295" y1="408" x2="505" y2="408" stroke="#E8A045" stroke-width="1" opacity="0.5"/>

  <text x="400" y="436" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#3D2B1F" letter-spacing="1">MEDIUM ROAST</text>
  <text x="400" y="472" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7A6A5A" letter-spacing="1">Caramel · Hazelnut · Dark Cherry</text>
  <text x="400" y="510" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7A6A5A">HUILA DEPARTMENT, COLOMBIA</text>

  <rect x="340" y="526" width="120" height="28" rx="14" fill="#1A0A00"/>
  <text x="400" y="544" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#E8A045" letter-spacing="1">1500–1900m</text>

  <text x="400" y="588" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7A6A5A" letter-spacing="2">250g · ROASTED TO ORDER</text>

  <!-- Abstract mountain shape (Colombia) -->
  <path d="M340 760 L370 720 L400 740 L430 710 L460 760 Z" fill="#1A0A00" opacity="0.4"/>
  <line x1="340" y1="760" x2="460" y2="760" stroke="#E8A045" stroke-width="1" opacity="0.3"/>

  <ellipse cx="400" cy="950" rx="180" ry="60" fill="#E8A045" opacity="0.06"/>
  <text x="400" y="970" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7A6A5A" letter-spacing="3" opacity="0.7">EMBER &amp; ASH</text>
</svg>