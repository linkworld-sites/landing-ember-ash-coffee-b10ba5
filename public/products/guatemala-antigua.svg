<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000">
  <defs>
    <linearGradient id="bg-gua" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0A0300"/>
      <stop offset="100%" stop-color="#1A0A00"/>
    </linearGradient>
    <linearGradient id="bag-gua" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3D2B1F"/>
      <stop offset="45%" stop-color="#2D1206"/>
      <stop offset="100%" stop-color="#0A0300"/>
    </linearGradient>
    <linearGradient id="label-gua" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#F5ECD7"/>
      <stop offset="100%" stop-color="#EDE4CC"/>
    </linearGradient>
    <radialGradient id="light-gua" cx="50%" cy="85%" r="50%">
      <stop offset="0%" stop-color="#C44B1B" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <rect width="800" height="1000" fill="url(#bg-gua)"/>
  <rect width="800" height="1000" fill="url(#light-gua)"/>

  <circle cx="150" cy="150" r="2" fill="#C44B1B" opacity="0.25"/>
  <circle cx="660" cy="350" r="1.5" fill="#E8A045" opacity="0.2"/>
  <circle cx="700" cy="750" r="1" fill="#C44B1B" opacity="0.25"/>

  <!-- Bag -->
  <rect x="220" y="180" width="360" height="560" rx="12" fill="url(#bag-gua)"/>
  <line x1="275" y1="180" x2="275" y2="740" stroke="#0A0300" stroke-width="1.5" opacity="0.5"/>
  <line x1="525" y1="180" x2="525" y2="740" stroke="#0A0300" stroke-width="1.5" opacity="0.5"/>

  <path d="M220 180 Q280 165 400 163 Q520 165 580 180" stroke="#0A0300" stroke-width="2" fill="none" opacity="0.5"/>
  <rect x="240" y="155" width="320" height="30" rx="4" fill="#0A0300" opacity="0.9"/>

  <!-- Valve -->
  <circle cx="400" cy="220" r="20" fill="#0A0300" opacity="0.6"/>
  <circle cx="400" cy="220" r="14" fill="none" stroke="#3D2B1F" stroke-width="1.5" opacity="0.8"/>
  <circle cx="400" cy="220" r="6" fill="#3D2B1F" opacity="0.5"/>

  <!-- Label -->
  <rect x="255" y="275" width="290" height="330" rx="6" fill="url(#label-gua)"/>
  <rect x="255" y="275" width="290" height="8" rx="3" fill="#1A0A00"/>

  <text x="400" y="320" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7A6A5A" letter-spacing="3" font-style="italic">SINGLE ORIGIN</text>

  <text x="400" y="358" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#1A0A00">Guatemala</text>
  <text x="400" y="388" text-anchor="middle" font-family="Georgia, serif" font-size="20" font-weight="700" fill="#1A0A00">Antigua</text>

  <line x1="295" y1="406" x2="505" y2="406" stroke="#1A0A00" stroke-width="1" opacity="0.3"/>

  <text x="400" y="434" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#3D2B1F" letter-spacing="1">DARK ROAST</text>
  <text x="400" y="470" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7A6A5A" letter-spacing="1">Dark Chocolate · Spiced Oak · Brown Sugar</text>
  <text x="400" y="508" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#7A6A5A">SACATEPÉQUEZ, GUATEMALA</text>

  <rect x="335" y="522" width="130" height="28" rx="14" fill="#1A0A00"/>
  <text x="400" y="540" text-anchor="middle" font-family="Georgia, serif" font-size="10" fill="#D4C8B0" letter-spacing="1">1500–1700m</text>

  <text x="400" y="588" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7A6A5A" letter-spacing="2">250g · ROASTED TO ORDER</text>

  <!-- Volcano silhouette (Antigua's famous volcanoes) -->
  <path d="M320 780 L370 730 L400 750 L430 725 L480 780 Z" fill="#1A0A00" opacity="0.5"/>
  <!-- Smoke wisps -->
  <path d="M368 730 Q365 715 370 705" stroke="#3D2B1F" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>
  <path d="M430 726 Q427 710 432 700" stroke="#3D2B1F" stroke-width="1.5" fill="none" opacity="0.5" stroke-linecap="round"/>

  <ellipse cx="400" cy="960" rx="180" ry="55" fill="#C44B1B" opacity="0.09"/>
  <text x="400" y="978" text-anchor="middle" font-family="Georgia, serif" font-size="11" fill="#7A6A5A" letter-spacing="3" opacity="0.6">EMBER &amp; ASH</text>
</svg>